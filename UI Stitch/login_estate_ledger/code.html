<body class="bg-surface text-on-surface font-body h-screen w-full overflow-hidden flex antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Left Architectural Image Area -->
<div class="hidden lg:block lg:w-5/12 xl:w-1/2 relative bg-surface-container-low h-full">
<!-- The background image serves as the editorial anchor -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Minimalist modern mansion interior hallway with vast floor-to-ceiling windows, sharp architectural lines, soft natural daylight, and pale stone floors" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDwuHC96SaUv5F80m3iBAG9YMfZGUOn2lPNozdiG5fT7sn2lzMOZbCFDep8O6g9ki6p_0tT2AJkce4MpynRvaJz_3KonRjzgo_8f8OAaiBybUJOATA3zvSwI95LrYBO6LlPg5YCWF2Oa5uofLfnCffio94FAc1cIp4jiT01_QHmLwSNcaeSHfzpToiUUgVUbbstHwXKwv3oWSUnI635KboUxaBc3etuMf6xZTqluXRwzOUqo-WKZh-mTj2r6H49A3hXLdj_9uVAqWE');">
</div>
<!-- Subtle tonal overlay to ensure the image feels integrated and premium -->
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 via-transparent to-transparent"></div>
<!-- Decorative subtle branding on the image -->
<div class="absolute bottom-12 left-12">
<p class="font-headline text-white/80 font-medium tracking-widest uppercase text-sm">Estate Curate Architecture</p>
</div>
</div>
<!-- Right Login Form Area -->
<div class="w-full lg:w-7/12 xl:w-1/2 flex flex-col justify-center items-center bg-surface px-6 sm:px-12 md:px-24 h-full overflow-y-auto">
<div class="w-full max-w-md flex flex-col pt-12 pb-24">
<!-- Branding & Header -->
<div class="mb-12">
<div class="w-12 h-12 bg-primary rounded-xl mb-8 flex items-center justify-center ambient-shadow">
<span class="material-symbols-outlined text-on-primary" data-icon="domain" data-weight="fill" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<h1 class="font-headline text-4xl lg:text-5xl font-bold text-primary tracking-tight" style="letter-spacing: -0.02em;">Estate Ledger</h1>
<p class="font-body text-on-surface-variant mt-4 text-lg leading-relaxed">Curated management for premium property portfolios. Enter your credentials to proceed.</p>
</div>
<!-- Authentication Form -->
<form class="space-y-6 flex flex-col">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant block" for="email">Email Address</label>
<input autocomplete="email" class="w-full bg-surface-container-highest border-transparent rounded-xl py-3.5 px-4 text-on-surface placeholder:text-outline/60 focus:border-transparent focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-200" id="email" placeholder="curator@estateledger.com" type="email"/>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-sm font-medium text-on-surface-variant block" for="password">Password</label>
<a class="font-label text-sm font-medium text-secondary hover:text-primary transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<input autocomplete="current-password" class="w-full bg-surface-container-highest border-transparent rounded-xl py-3.5 px-4 text-on-surface placeholder:text-outline/60 focus:border-transparent focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Remember Me Checkbox -->
<div class="flex items-center pt-2 pb-4">
<input class="w-5 h-5 bg-surface-container-highest border-transparent rounded text-secondary focus:ring-2 focus:ring-primary/40 focus:ring-offset-0 focus:ring-offset-surface transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-3 font-label text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Submit Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-body text-base font-medium rounded-full py-4 px-8 mt-2 hover:opacity-90 transition-all duration-300 ambient-shadow flex justify-center items-center gap-2 group" type="button">
<span>Access Portal</span>
<span class="material-symbols-outlined text-sm transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-16 text-center lg:text-left">
<p class="font-label text-xs text-on-surface-variant/70">
                    © 2024 Estate Curate Systems. All rights reserved.
                </p>
